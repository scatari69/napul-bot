services:
  deadlock-bot:
    build: .
    container_name: deadlock_bot
    restart: unless-stopped
    volumes:
      # Данные — в томе, чтобы переживали пересборку
      - ./data:/app/data
      # Код монтируем поверх образа: после git pull хватает Restart, без --build.
      # Меняешь requirements.txt — вот тогда нужен docker compose up -d --build.
      - ./bot.py:/app/bot.py:ro
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DATA_DIR=/app/data
      # Чат, в котором работают пасхалки (/egg)
      - EGG_CHAT_ID=${EGG_CHAT_ID:-1179357258}
      # Кто управляет пасхалками; пусто — любой админ чата
      - ADMIN_ID=${ADMIN_ID:-}
      # Часовой пояс: по нему бот сбрасывает списки сбора в 03:00
      - TZ=${TZ:-Europe/Kyiv}
